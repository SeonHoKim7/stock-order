spring:
  application:
    name: stock-order

  config:
    import: optional:classpath:secret-application.yml

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false

  thymeleaf:
    cache: false

server:
  port: 8080

logging:
  level:
    com.stockandorder: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
