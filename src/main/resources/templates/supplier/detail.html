<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${supplier.name} + ' - StockAndOrder'">거래처 상세</title>
</head>
<body>

<h2>거래처 상세</h2>

<a href="/suppliers">목록으로</a>

<div th:if="${message}" th:text="${message}" style="color:green;"></div>

<div th:if="${!supplier.active}" style="color:red;">[비활성화된 거래처]</div>

<table border="1">
    <tr>
        <th>거래처명</th>
        <td th:text="${supplier.name}"></td>
    </tr>
    <tr>
        <th>유형</th>
        <td th:text="${supplier.supplierTypeLabel}"></td>
    </tr>
    <tr>
        <th>담당자</th>
        <td th:text="${supplier.contactName != null ? supplier.contactName : '-'}"></td>
    </tr>
    <tr>
        <th>연락처</th>
        <td th:text="${supplier.contactPhone != null ? supplier.contactPhone : '-'}"></td>
    </tr>
    <tr>
        <th>이메일</th>
        <td th:text="${supplier.contactEmail != null ? supplier.contactEmail : '-'}"></td>
    </tr>
    <tr>
        <th>주소</th>
        <td th:text="${supplier.address != null ? supplier.address : '-'}"></td>
    </tr>
    <tr>
        <th>상태</th>
        <td th:text="${supplier.active ? '활성' : '비활성'}"></td>
    </tr>
    <tr>
        <th>등록일</th>
        <td th:text="${#temporals.format(supplier.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
    <tr>
        <th>최종 수정일</th>
        <td th:text="${#temporals.format(supplier.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
</table>

<div sec:authorize="hasAnyRole('MANAGER', 'ADMIN')" th:if="${supplier.active}">
    <a th:href="@{/suppliers/{id}/edit(id=${supplier.supplierId})}">수정</a>
</div>

<div sec:authorize="hasRole('ADMIN')" th:if="${supplier.active}">
    <form th:action="@{/suppliers/{id}/deactivate(id=${supplier.supplierId})}" method="post">
        <button type="submit" onclick="return confirm('거래처를 비활성화하시겠습니까?')">비활성화</button>
    </form>
</div>

<div sec:authorize="hasRole('ADMIN')" th:if="${!supplier.active}">
    <form th:action="@{/suppliers/{id}/activate(id=${supplier.supplierId})}" method="post">
        <button type="submit" onclick="return confirm('거래처를 다시 활성화하시겠습니까?')">활성화</button>
    </form>
</div>

</body>
</html>
