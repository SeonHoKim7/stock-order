<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>거래처 수정 - StockAndOrder</title>
</head>
<body>

<h2>거래처 수정</h2>

<a th:href="@{/suppliers/{id}(id=${supplier.supplierId})}">상세로</a>

<form th:action="@{/suppliers/{id}/edit(id=${supplier.supplierId})}" th:object="${form}" method="post">

    <div>
        <label>거래처명 *</label>
        <input type="text" th:field="*{name}">
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
    </div>

    <div>
        <label>거래처 유형 *</label>
        <select th:field="*{supplierType}">
            <option th:each="type : ${supplierTypes}"
                    th:value="${type.name()}"
                    th:text="${type.label}"></option>
        </select>
        <span th:if="${#fields.hasErrors('supplierType')}" th:errors="*{supplierType}" style="color:red;"></span>
    </div>

    <div>
        <label>담당자명</label>
        <input type="text" th:field="*{contactName}">
        <span th:if="${#fields.hasErrors('contactName')}" th:errors="*{contactName}" style="color:red;"></span>
    </div>

    <div>
        <label>연락처</label>
        <input type="text" th:field="*{contactPhone}" placeholder="예: 02-1234-5678">
        <span th:if="${#fields.hasErrors('contactPhone')}" th:errors="*{contactPhone}" style="color:red;"></span>
    </div>

    <div>
        <label>이메일</label>
        <input type="text" th:field="*{contactEmail}">
        <span th:if="${#fields.hasErrors('contactEmail')}" th:errors="*{contactEmail}" style="color:red;"></span>
    </div>

    <div>
        <label>주소</label>
        <textarea th:field="*{address}" rows="2"></textarea>
        <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}" style="color:red;"></span>
    </div>

    <button type="submit">저장</button>
    <a th:href="@{/suppliers/{id}(id=${supplier.supplierId})}">취소</a>
</form>

</body>
</html>
