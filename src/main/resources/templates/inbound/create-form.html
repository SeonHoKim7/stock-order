<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>입고 등록 - StockAndOrder</title>
</head>
<body>

<h2>입고 등록</h2>

<a href="/inbounds">목록으로</a>

<!-- 1단계: 입고할 발주 선택 -->
<form method="get" th:action="@{/inbounds/new}">
    <label>입고 대상 발주 *</label>
    <select name="orderId" onchange="this.form.submit()">
        <option value="">-- 발주 선택 --</option>
        <option th:each="po : ${receivableOrders}"
                th:value="${po.orderId}"
                th:text="${po.orderNumber} + ' (' + ${po.supplierName} + ', ' + ${po.statusLabel} + ')'"
                th:selected="${order != null and order.orderId == po.orderId}"></option>
    </select>
    <span th:if="${receivableOrders.isEmpty()}" style="color:gray;">입고 가능한(승인/진행중) 발주가 없습니다.</span>
</form>

<!-- 2단계: 발주가 선택된 경우에만 입고 입력 폼 노출 -->
<div th:if="${order != null}">
    <hr>
    <p>
        <strong th:text="${order.orderNumber}"></strong>
        / 거래처: <span th:text="${order.supplierName}"></span>
    </p>

    <form th:action="@{/inbounds}" th:object="${form}" method="post">
        <input type="hidden" th:field="*{orderId}">

        <div>
            <label>입고일 *</label>
            <input type="date" th:field="*{inboundDate}">
            <span th:if="${#fields.hasErrors('inboundDate')}" th:errors="*{inboundDate}" style="color:red;"></span>
        </div>

        <div>
            <label>비고</label>
            <textarea th:field="*{note}" rows="2"></textarea>
            <span th:if="${#fields.hasErrors('note')}" th:errors="*{note}" style="color:red;"></span>
        </div>

        <h3>입고 항목</h3>
        <span th:if="${#fields.hasErrors('items')}" th:errors="*{items}" style="color:red;"></span>

        <table border="1">
            <thead>
                <tr>
                    <th>상품</th>
                    <th>발주 수량</th>
                    <th>기입고</th>
                    <th>이번 입고 수량</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <!-- 미완료(기입고 < 발주) 항목만 입고 입력 대상으로 펼친다. 필터링으로 인덱스는 연속 보장 -->
                <tr th:each="item, stat : ${order.items.?[receivedQuantity < quantity]}">
                    <td>
                        <span th:text="${item.productCode}"></span>
                        <span th:text="${item.productName}"></span>
                        <input type="hidden" th:name="${'items[' + stat.index + '].orderItemId'}" th:value="${item.orderItemId}">
                    </td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.receivedQuantity}"></td>
                    <td>
                        <input type="number" th:name="${'items[' + stat.index + '].quantity'}"
                               min="1" th:max="${item.quantity - item.receivedQuantity}"
                               th:value="${item.quantity - item.receivedQuantity}">
                    </td>
                    <td><button type="button" onclick="this.closest('tr').remove()">제외</button></td>
                </tr>
                <tr th:if="${order.items.?[receivedQuantity < quantity].isEmpty()}">
                    <td colspan="5">입고할 항목이 없습니다. (전량 입고 완료된 발주입니다.)</td>
                </tr>
            </tbody>
        </table>

        <br>
        <button type="submit">입고 등록</button>
        <a href="/inbounds">취소</a>
    </form>
</div>

</body>
</html>
