<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${inbound.inboundNumber} + ' - StockAndOrder'">입고 상세</title>
</head>
<body>

<h2>입고 상세</h2>

<a href="/inbounds">목록으로</a>

<div th:if="${message}" th:text="${message}" style="color:green;"></div>

<table border="1">
    <tr><th>입고번호</th><td th:text="${inbound.inboundNumber}"></td></tr>
    <tr>
        <th>발주번호</th>
        <td><a th:href="@{/orders/{id}(id=${inbound.orderId})}" th:text="${inbound.orderNumber}"></a></td>
    </tr>
    <tr><th>거래처</th><td th:text="${inbound.supplierName}"></td></tr>
    <tr><th>처리자</th><td th:text="${inbound.processorName}"></td></tr>
    <tr><th>입고일</th><td th:text="${#temporals.format(inbound.inboundDate, 'yyyy-MM-dd')}"></td></tr>
    <tr><th>등록일시</th><td th:text="${#temporals.format(inbound.createdAt, 'yyyy-MM-dd HH:mm')}"></td></tr>
    <tr><th>비고</th><td th:text="${inbound.note != null ? inbound.note : '-'}"></td></tr>
</table>

<h3>입고 항목</h3>
<table border="1">
    <thead>
        <tr>
            <th>상품코드</th>
            <th>상품명</th>
            <th>이번 입고 수량</th>
            <th>발주 수량</th>
            <th>누적 입고</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="item : ${inbound.items}">
            <td th:text="${item.productCode}"></td>
            <td th:text="${item.productName}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.orderedQuantity}"></td>
            <td th:text="${item.receivedQuantity} + ' / ' + ${item.orderedQuantity}"></td>
        </tr>
    </tbody>
</table>

</body>
</html>
