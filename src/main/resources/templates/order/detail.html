<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${order.orderNumber} + ' - StockAndOrder'">발주 상세</title>
</head>
<body>

<h2>발주 상세</h2>

<a href="/orders">목록으로</a>

<div th:if="${message}" th:text="${message}" style="color:green;"></div>

<table border="1">
    <tr><th>발주번호</th><td th:text="${order.orderNumber}"></td></tr>
    <tr><th>거래처</th><td th:text="${order.supplierName}"></td></tr>
    <tr><th>상태</th><td th:text="${order.statusLabel}"></td></tr>
    <tr><th>요청자</th><td th:text="${order.requesterName}"></td></tr>
    <tr><th>처리자(승인/반려)</th><td th:text="${order.approverName != null ? order.approverName : '-'}"></td></tr>
    <tr><th>총액</th><td th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT')}"></td></tr>
    <tr><th>발주일</th><td th:text="${#temporals.format(order.orderedAt, 'yyyy-MM-dd HH:mm')}"></td></tr>
    <tr><th>처리일</th><td th:text="${order.processedAt != null ? #temporals.format(order.processedAt, 'yyyy-MM-dd HH:mm') : '-'}"></td></tr>
    <tr th:if="${order.status == 'REJECTED'}"><th>반려 사유</th><td th:text="${order.rejectReason}"></td></tr>
    <tr><th>비고</th><td th:text="${order.note != null ? order.note : '-'}"></td></tr>
</table>

<h3>발주 항목</h3>
<table border="1">
    <thead>
        <tr>
            <th>상품코드</th>
            <th>상품명</th>
            <th>수량</th>
            <th>단가</th>
            <th>금액</th>
            <th>입고 수량</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="item : ${order.items}">
            <td th:text="${item.productCode}"></td>
            <td th:text="${item.productName}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${#numbers.formatDecimal(item.unitPrice, 1, 'COMMA', 0, 'POINT')}"></td>
            <td th:text="${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 0, 'POINT')}"></td>
            <td th:text="${item.receivedQuantity} + ' / ' + ${item.quantity}"></td>
        </tr>
    </tbody>
</table>

<!-- 상태 전이 액션: PENDING 상태에서만 노출 -->
<div th:if="${order.status == 'PENDING'}">
    <sec:authorize access="hasAnyRole('MANAGER', 'ADMIN')">
        <form th:action="@{/orders/{id}/approve(id=${order.orderId})}" method="post" style="display:inline;">
            <button type="submit" onclick="return confirm('이 발주를 승인하시겠습니까?')">승인</button>
        </form>

        <form th:action="@{/orders/{id}/reject(id=${order.orderId})}" method="post" style="display:inline;">
            <input type="text" name="rejectReason" placeholder="반려 사유" required>
            <button type="submit" onclick="return confirm('이 발주를 반려하시겠습니까?')">반려</button>
        </form>
    </sec:authorize>

    <form th:action="@{/orders/{id}/cancel(id=${order.orderId})}" method="post" style="display:inline;">
        <button type="submit" onclick="return confirm('이 발주를 취소하시겠습니까?')">취소</button>
    </form>
</div>

</body>
</html>
