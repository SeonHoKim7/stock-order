<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>출고 관리 - StockAndOrder</title>
</head>
<body>

<h2>출고 관리</h2>

<a href="/dashboard">대시보드</a>

<div th:if="${message}" th:text="${message}" style="color:green;"></div>

<!-- 검색 폼 -->
<form method="get" th:action="@{/outbounds}">
    <select name="supplierId">
        <option value="">전체 판매처</option>
        <option th:each="sup : ${suppliers}"
                th:value="${sup.supplierId}"
                th:text="${sup.name}"
                th:selected="${condition.supplierId != null and condition.supplierId == sup.supplierId}"></option>
    </select>
    <input type="date" name="startDate" th:value="${condition.startDate}">
    ~
    <input type="date" name="endDate" th:value="${condition.endDate}">
    <button type="submit">검색</button>
    <a th:href="@{/outbounds}">초기화</a>
</form>

<sec:authorize access="hasAnyRole('MANAGER', 'ADMIN')">
    <a href="/outbounds/new">출고 등록</a>
</sec:authorize>

<!-- 출고 목록 -->
<table border="1">
    <thead>
        <tr>
            <th>출고번호</th>
            <th>판매처</th>
            <th>처리자</th>
            <th>매출액</th>
            <th>출고일</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="outbound : ${outbounds}">
            <td><a th:href="@{/outbounds/{id}(id=${outbound.outboundId})}" th:text="${outbound.outboundNumber}"></a></td>
            <td th:text="${outbound.supplierName}"></td>
            <td th:text="${outbound.processorName}"></td>
            <td th:text="${#numbers.formatDecimal(outbound.totalAmount, 1, 'COMMA', 0, 'POINT')}"></td>
            <td th:text="${#temporals.format(outbound.outboundDate, 'yyyy-MM-dd')}"></td>
        </tr>
        <tr th:if="${outbounds.isEmpty()}">
            <td colspan="5">출고 내역이 없습니다.</td>
        </tr>
    </tbody>
</table>

<!-- 페이징 -->
<div th:if="${outbounds.totalPages > 1}">
    <a th:if="${!outbounds.first}"
       th:href="@{/outbounds(supplierId=${condition.supplierId}, startDate=${condition.startDate}, endDate=${condition.endDate}, page=${outbounds.number - 1})}">이전</a>
    <span th:each="i : ${#numbers.sequence(0, outbounds.totalPages - 1)}">
        <a th:if="${i != outbounds.number}"
           th:href="@{/outbounds(supplierId=${condition.supplierId}, startDate=${condition.startDate}, endDate=${condition.endDate}, page=${i})}"
           th:text="${i + 1}"></a>
        <strong th:if="${i == outbounds.number}" th:text="${i + 1}"></strong>
    </span>
    <a th:if="${!outbounds.last}"
       th:href="@{/outbounds(supplierId=${condition.supplierId}, startDate=${condition.startDate}, endDate=${condition.endDate}, page=${outbounds.number + 1})}">다음</a>
</div>

<p>총 <span th:text="${outbounds.totalElements}"></span>건</p>

</body>
</html>
