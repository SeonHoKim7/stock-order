<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카테고리 관리 - StockAndOrder</title>
</head>
<body>

<h2>카테고리 관리</h2>

<a href="/dashboard">대시보드</a>

<div th:if="${message}" th:text="${message}" style="color:green;"></div>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>이름</th>
            <th>설명</th>
            <th>등록일</th>
            <th sec:authorize="hasAnyRole('MANAGER', 'ADMIN')"></th>
            <th sec:authorize="hasRole('ADMIN')"></th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.categoryId}"></td>
            <td th:text="${category.name}"></td>
            <td th:text="${category.description}"></td>
            <td th:text="${#temporals.format(category.createdAt, 'yyyy-MM-dd')}"></td>
            <td sec:authorize="hasAnyRole('MANAGER', 'ADMIN')">
                <a th:href="@{/categories/{id}/edit(id=${category.categoryId})}">수정</a>
            </td>
            <td sec:authorize="hasRole('ADMIN')">
                <form th:action="@{/categories/{id}/delete(id=${category.categoryId})}" method="post"
                      style="display:inline;">
                    <button type="submit"
                            onclick="return confirm('삭제하시겠습니까? 상품이 있는 카테고리는 삭제할 수 없습니다.')">삭제</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(categories)}">
            <td colspan="6">등록된 카테고리가 없습니다.</td>
        </tr>
    </tbody>
</table>

<div sec:authorize="hasAnyRole('MANAGER', 'ADMIN')">
    <h3>카테고리 등록</h3>
    <form th:action="@{/categories}" th:object="${createForm}" method="post">
        <div>
            <label>이름</label>
            <input type="text" th:field="*{name}">
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
        </div>
        <div>
            <label>설명</label>
            <input type="text" th:field="*{description}">
            <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" style="color:red;"></span>
        </div>
        <button type="submit">등록</button>
    </form>
</div>

</body>
</html>
