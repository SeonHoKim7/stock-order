<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원 생성 - StockAndOrder</title>
</head>
<body>

<h2>신규 회원 생성</h2>

<form th:action="@{/admin/members}" th:object="${form}" method="post">

    <div>
        <label>아이디</label>
        <input type="text" th:field="*{loginId}">
        <span th:if="${#fields.hasErrors('loginId')}" th:errors="*{loginId}" style="color:red;"></span>
    </div>
    <div>
        <label>비밀번호</label>
        <input type="password" th:field="*{password}">
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></span>
    </div>
    <div>
        <label>이름</label>
        <input type="text" th:field="*{name}">
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
    </div>
    <div>
        <label>이메일</label>
        <input type="email" th:field="*{email}">
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red;"></span>
    </div>
    <div>
        <label>역할</label>
        <select th:field="*{role}">
            <option value="">선택</option>
            <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
        </select>
        <span th:if="${#fields.hasErrors('role')}" th:errors="*{role}" style="color:red;"></span>
    </div>

    <button type="submit">생성</button>
    <a href="/admin/members">취소</a>
</form>

</body>
</html>
