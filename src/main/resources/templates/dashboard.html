<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대시보드 - StockAndOrder</title>
</head>
<body>

<h2>대시보드</h2>

<p>안녕하세요, <span th:text="${memberName}"></span>님 (<span th:text="${role}"></span>)</p>

<form th:action="@{/logout}" method="post">
    <button type="submit">로그아웃</button>
</form>

<!-- 요약 위젯: 오늘의 입고/출고 건수 + 승인 대기 발주 건수 -->
<div style="display:flex; gap:16px; margin:16px 0;">
    <!-- "오늘"은 등록 시각(created_at) 기준이다 (입고/출고 모두 동일 기준으로 맞춤) -->
    <div style="border:1px solid #ccc; padding:12px;">
        <div>오늘 입고</div>
        <strong th:text="${dashboard.todayInboundCount}">0</strong>건
        <div><a th:href="@{/inbounds}">입고 목록</a></div>
    </div>

    <div style="border:1px solid #ccc; padding:12px;">
        <div>오늘 출고</div>
        <strong th:text="${dashboard.todayOutboundCount}">0</strong>건
        <div><a th:href="@{/outbounds}">출고 목록</a></div>
    </div>

    <!-- 승인 대기 위젯은 승인 권한이 있는 MANAGER/ADMIN에게만 노출한다(못 누르는 숫자는 보여주지 않음).
         단, 이는 화면 정리일 뿐이며 승인 기능 자체는 서버 권한으로 막혀 있다. -->
    <div sec:authorize="hasAnyRole('ADMIN','MANAGER')" style="border:1px solid #ccc; padding:12px;">
        <div>승인 대기 발주</div>
        <strong th:text="${dashboard.pendingOrderCount}">0</strong>건
        <div><a th:href="@{/orders(status='PENDING')}">승인 대기 목록</a></div>
    </div>
</div>

<!-- 안전 재고 미달 경고 위젯: 건수 + 상위 N개 미리보기 + 전체보기 -->
<div>
    <h3>안전 재고 경고 (<span th:text="${dashboard.lowStockCount}">0</span>건)</h3>

    <table border="1" th:if="${!dashboard.lowStockPreview.isEmpty()}">
        <thead>
            <tr>
                <th>상품명</th>
                <th>현재고</th>
                <th>안전재고</th>
                <th>상태</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${dashboard.lowStockPreview}">
                <td><a th:href="@{/products/{id}(id=${item.productId})}" th:text="${item.productName}"></a></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${item.safetyStock}"></td>
                <td th:text="${item.statusLabel}" style="color:red; font-weight:bold;"></td>
            </tr>
        </tbody>
    </table>

    <p th:if="${dashboard.lowStockPreview.isEmpty()}">경고 대상 상품이 없습니다.</p>

    <!-- 전체보기: 별도 페이지 없이 기존 재고 목록에 경고 필터(품절+미달)+위험도순을 걸어 이동 -->
    <a th:if="${dashboard.lowStockCount > 0}"
       th:href="@{/stocks(statuses=${T(com.stockandorder.domain.stock.enums.StockStatus).OUT_OF_STOCK},
                          statuses=${T(com.stockandorder.domain.stock.enums.StockStatus).SHORTAGE},
                          sort='RISK')}">전체보기</a>
</div>

</body>
</html>
