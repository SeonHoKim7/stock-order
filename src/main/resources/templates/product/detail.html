<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - StockAndOrder'">상품 상세</title>
</head>
<body>

<h2>상품 상세</h2>

<a href="/products">목록으로</a>

<div th:if="${message}" th:text="${message}" style="color:green;"></div>

<div th:if="${!product.active}" style="color:red;">[비활성화된 상품]</div>

<table border="1">
    <tr>
        <th>상품코드</th>
        <td th:text="${product.productCode}"></td>
    </tr>
    <tr>
        <th>상품명</th>
        <td th:text="${product.name}"></td>
    </tr>
    <tr>
        <th>카테고리</th>
        <td th:text="${product.categoryName}"></td>
    </tr>
    <tr>
        <th>단위</th>
        <td th:text="${product.unit}"></td>
    </tr>
    <tr>
        <th>단가</th>
        <td th:text="${#numbers.formatDecimal(product.unitPrice, 1, 'COMMA', 0, 'POINT')}"></td>
    </tr>
    <tr>
        <th>안전 재고량</th>
        <td th:text="${product.safetyStock}"></td>
    </tr>
    <tr>
        <th>설명</th>
        <td th:text="${product.description != null ? product.description : '-'}"></td>
    </tr>
    <tr>
        <th>상태</th>
        <td th:text="${product.active ? '활성' : '비활성'}"></td>
    </tr>
    <tr>
        <th>등록일</th>
        <td th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
    <tr>
        <th>최종 수정일</th>
        <td th:text="${#temporals.format(product.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
</table>

<div sec:authorize="hasAnyRole('MANAGER', 'ADMIN')" th:if="${product.active}">
    <a th:href="@{/products/{id}/edit(id=${product.productId})}">수정</a>
</div>

<div sec:authorize="hasRole('ADMIN')" th:if="${product.active}">
    <form th:action="@{/products/{id}/deactivate(id=${product.productId})}" method="post">
        <button type="submit" onclick="return confirm('상품을 비활성화하시겠습니까?')">비활성화</button>
    </form>
</div>

<div sec:authorize="hasRole('ADMIN')" th:if="${!product.active}">
    <form th:action="@{/products/{id}/activate(id=${product.productId})}" method="post">
        <button type="submit" onclick="return confirm('상품을 다시 활성화하시겠습니까?')">활성화</button>
    </form>
</div>

</body>
</html>
